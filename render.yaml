services:
  # Backend FastAPI
  - type: web
    name: aura-analytics-api
    env: docker
    dockerContext: ./backend
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: aura-db
          property: connectionString

databases:
  - name: aura-db
    plan: free
